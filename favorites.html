<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Избранное — Мастерская свечей</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background-color: #fff8f2;
    color: #4b3832;
}

/* Шапка */
header {
    background-color: #d4a373;
    padding: 20px;
    text-align: center;
    color: white;
}

nav a {
    margin: 0 12px;
    text-decoration: none;
    color: white;
    font-weight: bold;
}

/* Сетка */
.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 300px));
    gap: 20px;
    justify-content: center;
    padding: 40px;
}

/* Карточка */
.card {
    background: white;
    border-radius: 15px;
    padding: 15px;
    text-align: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 10px;
}

/* Кнопка удаления */
.remove-btn {
    margin-top: 10px;
    padding: 10px 15px;
    border: none;
    background: #d4a373;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

.remove-btn:hover {
    background: #b5835a;
}

/* Пусто */
.empty {
    text-align: center;
    margin-top: 50px;
    font-size: 18px;
}
</style>
</head>

<body>

<header>
    <h1>Избранное ❤️</h1>
    <nav>
        <a href="index.html" data-nav="index">Главная</a>
        <a href="catalog.html" data-nav="catalog">Каталог</a>
        <a href="reviews.html" data-nav="reviews">Отзывы</a>
        <a href="contacts.html" data-nav="contacts">Контакты</a>
        <a href="favorites.html" data-nav="favorites">Избранное ❤️</a>
        <a href="cart.html" data-nav="cart">Корзина (<span id="cartCount">0</span>)</a>
    </nav>
</header>

<section>
    <div id="list" class="products"></div>
</section>

<script>
let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
const list = document.getElementById('list');

function render() {
    list.innerHTML = "";

    if (favorites.length === 0) {
        list.innerHTML = "<div class='empty'>Нет избранных товаров</div>";
        return;
    }

    favorites.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = "card";

        div.innerHTML = `
            <img src="${item.img}">
            <h3>${item.title}</h3>
            <p>${item.desc}</p>
            <button class="remove-btn" onclick="removeItem(${index})">
                Удалить
            </button>
        `;

        list.appendChild(div);
    });
}

function removeItem(index) {
    favorites.splice(index, 1);
    localStorage.setItem('favorites', JSON.stringify(favorites));
    render();
}

render();
</script>

</body>
</html>
