<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Отзывы — Мастерская свечей</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="reviews">

<header>
  <h1>Отзывы</h1>
  <nav>
        <a href="index.html" data-nav="index">Главная</a>
        <a href="catalog.html" data-nav="catalog">Каталог</a>
        <a href="reviews.html" data-nav="reviews">Отзывы</a>
        <a href="contacts.html" data-nav="contacts">Контакты</a>
        <a href="favorites.html" data-nav="favorites">Избранное ❤️</a>
        <a href="cart.html" data-nav="cart">Корзина (<span id="cartCount">0</span>)</a>
    </nav>
</header>

<main>
  <div class="container">
    <form class="form" id="reviewForm">
      <div class="field">
        <label>Имя</label>
        <input name="name" placeholder="Например, Анна" required />
      </div>
      <div class="field">
        <label>Отзыв</label>
        <textarea name="text" placeholder="Ваши впечатления..." required></textarea>
      </div>
      <button class="btn" type="submit">Оставить отзыв</button>
    </form>

    <div class="list" id="reviewsRoot"></div>
  </div>
</main>

<footer>© 2026 Мастерская свечей</footer>

<script src="app.js"></script>
</body>
</html>
